name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y gcc make flex bison
      - run: make test

  check-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y clang-format
      - run: make check-format

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y cppcheck
      - run: make lint

  devcontainer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: devcontainers/ci@v0.3
        with:
          runCmd: |
            make test
            make lint
            make check-format
            make format

  # Generate amalgamated axt.c and upload as artifact
  amalgamate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y flex bison
      - run: make amalgamate
      - uses: actions/upload-artifact@v4
        with:
          name: axt-amalgamated
          path: axt.c

  # Test amalgamated build on minimal Ubuntu container
  test-ubuntu-minimal:
    needs: amalgamate
    runs-on: ubuntu-latest
    container: ubuntu:24.04
    steps:
      - uses: actions/checkout@v6
      - run: apt-get update && apt-get install -y gcc
      - uses: actions/download-artifact@v4
        with:
          name: axt-amalgamated
      - run: cc axt.c -lpthread -o axt
      - run: AXT=$(pwd)/axt ./axt -j 1 test/test_suite.at

  # Test amalgamated build on AlmaLinux 9 container
  test-almalinux:
    needs: amalgamate
    runs-on: ubuntu-latest
    container: almalinux:9
    steps:
      - uses: actions/checkout@v6
      - run: dnf install -y gcc
      - uses: actions/download-artifact@v4
        with:
          name: axt-amalgamated
      - run: cc axt.c -lpthread -o axt
      - run: AXT=$(pwd)/axt ./axt -j 1 test/test_suite.at

  # Test amalgamated build on macOS
  test-macos:
    needs: amalgamate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: axt-amalgamated
      - run: cc axt.c -lpthread -o axt
      - run: AXT=$(pwd)/axt ./axt -j 1 test/test_suite.at

  # Test amalgamated build on Windows
  test-windows:
    needs: amalgamate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: axt-amalgamated
      - shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cl /W3 /D_CRT_SECURE_NO_WARNINGS axt.c /Fe:axt.exe
      - shell: cmd
        run: |
          set AXT=%cd%\axt.exe
          axt.exe -j 1 test\test_suite_win.at
